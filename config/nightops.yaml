# TheNightOps Configuration
# Copy to config/nightops.yaml and fill in your values.

agent:
  # Supported models: gemini-3.1-pro (default), gemini-3-flash,
  #                   gemini-2.5-pro, gemini-2.5-flash, gemini-2.0-flash
  model: gemini-2.5-pro
  max_investigation_time: 300
  max_agent_turns: 20
  require_human_approval:
    - pod_restart
    - deployment_rollback
    - external_notification
  verbose: false

# ── MCP Mode ──
#
# GCP MODE (default): Uses official Google Cloud MCP servers.
#   - gke.enabled=true, cloud_observability.enabled=true
#   - kubernetes.enabled=false, cloud_logging.enabled=false
#   - Requires: gcloud auth application-default login, IAM roles/mcp.toolUser
#
# LOCAL MODE: Uses custom self-hosted MCP servers (for offline/non-GCP use).
#   - gke.enabled=false, cloud_observability.enabled=false
#   - kubernetes.enabled=true, cloud_logging.enabled=true
#   - Start servers with: bash scripts/run-local.sh --local

mcp_servers:
  # ── Google Cloud Official MCP Servers (managed, IAM-authenticated) ──
  #
  # These use Google's production MCP infrastructure.
  # Authentication is handled via IAM (Application Default Credentials).
  # No API keys needed — just ensure your service account has the right roles.
  #
  # Setup: gcloud beta services mcp enable container.googleapis.com --project=$GCP_PROJECT_ID
  # Docs: https://docs.cloud.google.com/mcp/overview

  cloud_observability:
    type: official
    endpoint: https://logging.googleapis.com/mcp
    project_id: "${GCP_PROJECT_ID}"
    auth: iam
    enabled: true  # Set to false for LOCAL MODE

  gke:
    type: official
    endpoint: https://container.googleapis.com/mcp
    project_id: "${GCP_PROJECT_ID}"
    cluster: "${GKE_CLUSTER_NAME}"
    location: "${GKE_CLUSTER_LOCATION}"
    auth: iam
    enabled: true  # Set to false for LOCAL MODE

  # ── Grafana Official MCP (stdio transport via uvx mcp-grafana) ──
  #
  # Uses the official mcp-grafana server from Grafana Labs.
  # Runs as a subprocess with stdio transport — no local SSE server needed.
  # Provides: alerting, dashboards, Prometheus, Loki, incidents, on-call, annotations
  #
  # GitHub: https://github.com/grafana/mcp-grafana
  # Install: pip install uv && uvx mcp-grafana

  grafana:
    type: official
    transport: stdio
    url: "${GRAFANA_URL}"
    service_account_token: "${GRAFANA_SERVICE_ACCOUNT_TOKEN}"
    enabled: false
    # Uncomment to enable optional tool categories:
    # enabled_tools: "runpanelquery,examples,searchlogs"

  # ── Custom MCP Servers (self-hosted via SSE transport) ──
  #
  # These run as local processes managed by TheNightOps CLI.
  # Enable these for LOCAL MODE (offline/non-GCP development).
  # When using GCP MODE, keep these disabled to avoid duplicate tools.

  kubernetes:
    type: custom
    transport: sse
    host: "${NIGHTOPS_KUBERNETES_HOST}"
    port: 8002
    enabled: false  # Enable for LOCAL MODE (disable gke above)

  cloud_logging:
    type: custom
    transport: sse
    host: "${NIGHTOPS_CLOUD_LOGGING_HOST}"
    port: 8001
    project_id: "${GCP_PROJECT_ID}"
    enabled: false  # Enable for LOCAL MODE (disable cloud_observability above)

  slack:
    type: custom
    transport: sse
    host: "${NIGHTOPS_SLACK_HOST}"
    port: 8004
    bot_token: "${SLACK_BOT_TOKEN}"
    incident_channel: "#incidents"
    rca_channel: "#post-mortems"
    enabled: false  # Optional — enable when SLACK_BOT_TOKEN is configured

  notifications:
    type: custom
    transport: sse
    host: "${NIGHTOPS_NOTIFICATIONS_HOST}"
    port: 8005
    enabled: false  # Optional — enable when notification credentials are configured

# ── Multi-Cluster Support ──────────────────────────────────────
# Uncomment and configure for multi-cluster environments.
# Each cluster gets its own GKE MCP connection.

# clusters:
#   - name: prod-us-central1
#     project_id: "${GCP_PROJECT_ID}"
#     location: us-central1
#     environment: production
#     criticality: high
#     enabled: true
#
#   - name: staging-central
#     project_id: "${GCP_PROJECT_ID}"
#     location: us-central1
#     environment: staging
#     criticality: medium
#     enabled: true

# ── Webhook Ingestion ──────────────────────────────────────────
# Receives alerts from Grafana, Alertmanager, PagerDuty.
# Endpoints: /api/v1/webhooks/{grafana,alertmanager,pagerduty,generic}

webhook:
  enabled: true
  host: "0.0.0.0"
  port: 8090
  dedup_window_seconds: 300

# ── Kubernetes Event Watcher ───────────────────────────────────
# Watches K8s Warning events and auto-creates incidents.

event_watcher:
  enabled: true
  namespaces:
    - default
    - nightops-demo
  watch_reasons:
    - OOMKilled
    - CrashLoopBackOff
    - FailedScheduling
    - Unhealthy
    - BackOff
  min_severity_to_alert: Warning

# ── Incident Memory (Intelligence Layer) ──────────────────────
# Stores resolved incidents for pattern matching.
# The agent gets smarter with every incident it handles.

intelligence:
  enabled: true
  store_path: data/incident_store
  max_similar_results: 5
  similarity_threshold: 0.3

# ── Remediation Policy Engine ─────────────────────────────────
# Graduated autonomy: auto-approve safe actions, require approval for risky ones.

remediation:
  enabled: true
  policy_path: config/remediation_policies.yaml
  default_require_approval: true

# ── Proactive Anomaly Detection ───────────────────────────────
# Runs periodic health checks to catch issues before alerts fire.

proactive:
  enabled: true
  check_interval_seconds: 300
  checks:
    - crashloop_pods
    - oom_killed
    - memory_trending
    - error_rate_spike
    - deployment_zero_ready
  memory_threshold_percent: 85.0
  error_rate_multiplier: 2.0

# ── Impact Metrics ────────────────────────────────────────────
# Track MTTR, accuracy, hours saved to prove ROI.

metrics:
  enabled: true
  store_path: data/metrics
  estimated_manual_mttr_seconds: 2700  # 45 min baseline
