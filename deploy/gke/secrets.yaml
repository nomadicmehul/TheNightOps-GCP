# TheNightOps Secrets Template
#
# IMPORTANT: Do NOT commit real credentials to git.
# Fill in values and apply manually:
#   kubectl apply -f secrets.yaml
#
# For production, use Google Secret Manager + External Secrets Operator
# or seal with Sealed Secrets.

apiVersion: v1
kind: Secret
metadata:
  name: nightops-secrets
  namespace: nightops
  labels:
    app.kubernetes.io/part-of: thenightops
type: Opaque
stringData:
  # Required — Gemini API key for Google ADK
  GOOGLE_API_KEY: "REPLACE_WITH_YOUR_GOOGLE_API_KEY"

  # Required — GCP project for Cloud Logging and GKE MCP
  GCP_PROJECT_ID: "REPLACE_WITH_YOUR_PROJECT_ID"

  # Required — GKE cluster info
  GKE_CLUSTER_NAME: "REPLACE_WITH_YOUR_CLUSTER_NAME"
  GKE_CLUSTER_LOCATION: "REPLACE_WITH_YOUR_CLUSTER_LOCATION"

  # Optional — Slack bot token
  SLACK_BOT_TOKEN: ""

  # Optional — Grafana service account token
  GRAFANA_URL: "http://grafana.monitoring:3000"
  GRAFANA_SERVICE_ACCOUNT_TOKEN: ""

  # Optional — Email notifications (SMTP)
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  FROM_EMAIL: ""

  # Optional — Telegram notifications
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_CHAT_ID: ""
