# TheNightOps Custom MCP Servers
# Runs: Kubernetes, Cloud Logging, Slack, Notifications MCP servers

---
# ── Kubernetes MCP Server ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-kubernetes
  namespace: nightops
  labels:
    app.kubernetes.io/name: mcp-kubernetes
    app.kubernetes.io/part-of: thenightops
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-kubernetes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-kubernetes
        app.kubernetes.io/part-of: thenightops
        app.kubernetes.io/component: mcp-server
    spec:
      serviceAccountName: nightops-agent
      containers:
        - name: mcp-kubernetes
          image: AGENT_IMAGE
          command: ["python", "-m", "thenightops.mcp_servers.kubernetes.server"]
          ports:
            - containerPort: 8002
          envFrom:
            - secretRef:
                name: nightops-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-kubernetes
  namespace: nightops
  labels:
    app.kubernetes.io/name: mcp-kubernetes
    app.kubernetes.io/part-of: thenightops
spec:
  selector:
    app.kubernetes.io/name: mcp-kubernetes
  ports:
    - port: 8002
      targetPort: 8002

