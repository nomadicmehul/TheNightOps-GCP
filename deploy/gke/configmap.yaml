apiVersion: v1
kind: ConfigMap
metadata:
  name: nightops-config
  namespace: nightops
  labels:
    app.kubernetes.io/part-of: thenightops
data:
  nightops.yaml: |
    agent:
      model: gemini-3.1-pro
      max_investigation_time: 300
      max_agent_turns: 20
      require_human_approval:
        - pod_restart
        - deployment_rollback
        - external_notification
      verbose: false

    mcp_servers:
      # Official Google Cloud MCP (enabled for GKE deployments)
      cloud_observability:
        type: official
        endpoint: https://logging.googleapis.com/mcp
        auth: iam
        enabled: true

      gke:
        type: official
        endpoint: https://container.googleapis.com/mcp
        auth: iam
        enabled: true

      grafana:
        type: official
        transport: stdio
        enabled: false

      # Custom MCP servers (disabled when using official GCP MCP)
      kubernetes:
        type: custom
        transport: sse
        host: mcp-kubernetes
        port: 8002
        enabled: false

      cloud_logging:
        type: custom
        transport: sse
        host: mcp-cloud-logging
        port: 8001
        enabled: false

      slack:
        type: custom
        transport: sse
        host: mcp-slack
        port: 8004
        enabled: false

      notifications:
        type: custom
        transport: sse
        host: mcp-notifications
        port: 8005
        enabled: false

    webhook:
      enabled: true
      host: "0.0.0.0"
      port: 8090
      dedup_window_seconds: 300

    event_watcher:
      enabled: true
      namespaces:
        - default
        - nightops-demo
      watch_reasons:
        - OOMKilled
        - CrashLoopBackOff
        - FailedScheduling
        - Unhealthy
        - BackOff

    intelligence:
      enabled: true
      store_path: /app/data/incident_store
      max_similar_results: 5
      similarity_threshold: 0.3

    remediation:
      enabled: true
      policy_path: /app/config/remediation_policies.yaml
      default_require_approval: true

    proactive:
      enabled: true
      check_interval_seconds: 300
      checks:
        - crashloop_pods
        - oom_killed
        - memory_trending
        - error_rate_spike
        - deployment_zero_ready

    metrics:
      enabled: true
      store_path: /app/data/metrics

  remediation_policies.yaml: |
    policies:
      restart_pod:
        auto_approve_environments: ["development", "staging"]
        require_approval_environments: ["production"]
        conditions:
          max_restart_count: 3
        blocked: false
      scale_up:
        auto_approve_environments: ["development", "staging"]
        require_approval_environments: ["production"]
        conditions:
          max_replicas: 10
        blocked: false
      rollback_deployment:
        auto_approve_environments: []
        require_approval_environments: ["*"]
        blocked: false
      delete_namespace:
        blocked: true
      delete_pvc:
        blocked: true
      cluster_delete:
        blocked: true
      node_drain:
        blocked: true
